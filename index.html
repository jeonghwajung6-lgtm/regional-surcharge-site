<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>서울 지역할증</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --mint: #0CEFD3;
      --mint-dark: #09c4af;
      --mint-bg: #e8fdf9;
      --white: #fff;
      --g50: #f8fafc;
      --g100: #f1f5f9;
      --g200: #e2e8f0;
      --g400: #94a3b8;
      --g600: #475569;
      --g800: #1e293b;
      --red: #ef4444;
      --orange: #f97316;
      --yellow: #f59e0b;
      --red-bg: #fef2f2;
      --orange-bg: #fff7ed;
      --yellow-bg: #fffbeb;
    }
    html, body { height: 100%; background: var(--g50); font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; color: var(--g800); overscroll-behavior: none; }

    /* ─── HEADER ─── */
    .hd {
      position: sticky; top: 0; z-index: 300;
      background: var(--white);
      border-bottom: 1px solid var(--g200);
      padding: 14px 16px 12px;
    }
    .hd-top { display: flex; align-items: center; gap: 8px; margin-bottom: 11px; }
    .hd-logo { font-size: 13px; font-weight: 900; color: var(--g800); letter-spacing: -.3px; }
    .hd-logo em { color: var(--mint-dark); font-style: normal; }
    .hd-badge {
      margin-left: auto;
      font-size: 10px; font-weight: 700; color: var(--mint-dark);
      background: var(--mint-bg); padding: 3px 8px; border-radius: 20px;
    }
    /* Search */
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%; height: 46px;
      border: 2px solid var(--g200); border-radius: 14px;
      padding: 0 46px 0 46px;
      font-size: 15px; color: var(--g800);
      background: var(--g50);
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .search-wrap input:focus {
      border-color: var(--mint); background: var(--white);
      box-shadow: 0 0 0 4px rgba(12,239,211,.15);
    }
    .search-wrap input::placeholder { color: var(--g400); }
    .search-ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; pointer-events: none; }
    .search-x {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--g200); border: none; cursor: pointer;
      font-size: 12px; color: var(--g600);
      display: none; align-items: center; justify-content: center;
    }
    .voice-btn {
      width: 100%; height: 46px; border-radius: 14px;
      background: var(--mint); color: var(--g800);
      font-size: 15px; font-weight: 800; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 10px; transition: opacity .2s;
    }
    .voice-btn:active { opacity: .7; }
    .voice-btn.listening {
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(12,239,211,.5); }
      50% { box-shadow: 0 0 0 8px rgba(12,239,211,0); }
    }

    /* ─── VIEWS ─── */
    #viewSearch, #viewDetail { display: none; }
    #viewGrid { display: block; }

    /* ─── FAV LIST ─── */
    .fav-list-wrap { display: none; margin: 16px 16px 0; background: var(--white); border-radius: 14px; padding: 14px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 2px solid var(--mint); }
    .fav-header { font-size: 13px; color: var(--g800); font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .fav-item { display: flex; align-items: center; justify-content: space-between; font-size: 15px; padding: 10px 0; border-bottom: 1px solid var(--g100); }
    .fav-item:last-child { border-bottom: none; padding-bottom: 0; }
    .fav-item-left { display: flex; align-items: center; gap: 8px; }
    .fav-gu { font-size: 11px; background: var(--g100); padding: 3px 6px; border-radius: 6px; color: var(--g600); font-weight: 700; white-space: nowrap; }
    .fav-name { font-weight: 700; color: var(--g800); word-break: keep-all; }
    .fav-amt { font-weight: 800; color: var(--mint-dark); white-space: nowrap; flex-shrink: 0; }
    .fav-btn { font-size: 22px; color: var(--g200); cursor: pointer; background: none; border: none; padding: 4px; display: flex; align-items: center; justify-content: center; transition: transform .15s; margin-left: 8px; }
    .fav-btn:active { transform: scale(.8); }
    .fav-btn.active { color: var(--yellow); }

    /* ─── GRID VIEW ─── */
    .grid-header {
      padding: 16px 16px 8px;
      font-size: 13px; color: var(--g400); font-weight: 500;
    }
    .grid-header strong { color: var(--g800); font-size: 15px; font-weight: 800; }

    .gu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 0 16px 24px;
    }
    .gu-card {
      background: var(--white);
      border-radius: 18px;
      padding: 16px 14px;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      transition: transform .15s, box-shadow .15s, border-color .15s;
      position: relative; overflow: hidden;
      min-height: 96px;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .gu-card:active { transform: scale(.97); box-shadow: 0 1px 2px rgba(0,0,0,.1); background-color: var(--mint); }
    .gu-card-top { display: flex; align-items: flex-start; justify-content: space-between; }
    .gu-card-name { font-size: 18px; font-weight: 900; color: var(--g800); }
    .gu-card-icon { font-size: 20px; }
    .gu-card-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .gu-card-count { font-size: 12px; color: var(--g400); }
    .gu-max-badge {
      font-size: 11px; font-weight: 700;
      padding: 3px 8px; border-radius: 8px;
    }
    .gu-max-badge.c-mint { background: var(--mint-bg); color: var(--mint-dark); }
    .gu-max-badge.c-yellow { background: var(--yellow-bg); color: #92400e; }
    .gu-max-badge.c-orange { background: var(--orange-bg); color: #9a3412; }
    .gu-max-badge.c-red { background: var(--red-bg); color: #991b1b; }
    /* accent bar */
    .gu-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: var(--mint);
      transform: scaleX(0); transform-origin: left;
      transition: transform .2s;
    }
    .gu-card:active::after { transform: scaleX(1); }

    /* ─── DETAIL VIEW ─── */
    .detail-top {
      position: sticky; top: 0; z-index: 100;
      background: var(--white);
      padding: 14px 16px;
      border-bottom: 1px solid var(--g200);
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      width: 38px; height: 38px; border-radius: 12px;
      background: var(--g100); border: none; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .back-btn:active { background: var(--g200); }
    .detail-title-wrap { flex: 1; }
    .detail-title { font-size: 18px; font-weight: 900; letter-spacing: -.4px; }
    .detail-subtitle { font-size: 12px; color: var(--g400); margin-top: 1px; }

    /* Amount section */
    .amt-section { padding: 0 16px 6px; margin-top: 14px; }
    .amt-section-title {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .amt-pill {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 16px; font-weight: 900;
      padding: 6px 14px; border-radius: 12px;
    }
    .amt-pill.c-mint { background: var(--mint); color: var(--white); }
    .amt-pill.c-yellow { background: var(--yellow); color: var(--white); }
    .amt-pill.c-orange { background: var(--orange); color: var(--white); }
    .amt-pill.c-red { background: var(--red); color: var(--white); }
    .amt-pill-count { font-size: 12px; color: var(--g400); }

    /* Location cards */
    .loc-cards { display: flex; flex-direction: column; gap: 8px; }
    .loc-card {
      background: var(--white); border-radius: 14px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      border: 1px solid var(--g200);
    }
    .loc-card-left { flex: 1; min-width: 0; }
    .loc-card-name { font-size: 15px; font-weight: 700; line-height: 1.35; word-break: keep-all; }
    .loc-card-tags { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
    .tag {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px;
    }
    .tag-pickup { background: #fef3c7; color: #92400e; }
    .tag-deliver { background: #d1fae5; color: #065f46; }
    .tag-both { background: #ede9fe; color: #4c1d95; }
    .tag-note { background: var(--g100); color: var(--g600); }
    .loc-card-amt {
      font-size: 17px; font-weight: 900;
      flex-shrink: 0; white-space: nowrap;
    }
    .loc-card-amt.c-mint { color: var(--mint-dark); }
    .loc-card-amt.c-yellow { color: #d97706; }
    .loc-card-amt.c-orange { color: #ea580c; }
    .loc-card-amt.c-red { color: #dc2626; }

    .section-spacer { height: 16px; }
    .bottom-pad { height: 32px; }

    /* ─── SEARCH VIEW ─── */
    .search-header {
      padding: 14px 16px 8px;
      font-size: 13px; color: var(--g400);
    }
    .search-header strong { color: var(--mint-dark); }
    .no-result {
      text-align: center; padding: 60px 20px;
      color: var(--g400);
    }
    .no-result .icon { font-size: 42px; margin-bottom: 12px; }
    .no-result p { font-size: 14px; line-height: 1.6; }
  </style>
</head>

function getMaxAmt(gu) {
  const items = DATA[gu] || [];
  return items.length ? Math.max(...items.map(i => i.amount)) : 0;
}

function amtClass(amt) {
  if (amt >= 2000) return 'c-red';
  if (amt >= 1500) return 'c-orange';
  if (amt >= 1000) return 'c-yellow';
  return 'c-mint';
}

function amtLabel(amt) {
  if (amt >= 2000) return '최대 2,000원';
  if (amt >= 1500) return '최대 1,500원';
  if (amt >= 1000) return '최대 1,000원';
  return '최대 500원';
}

function typeTags(type) {
  if (!type) return '';
  const t = type.trim();
  if (t.includes('/') || t === '픽업/전달' || t === '전달/픽업')
    return '<span class="tag tag-both">픽업/전달</span>';
  if (t.includes('픽업')) return '<span class="tag tag-pickup">픽업</span>';
  return '<span class="tag tag-deliver">전달</span>';
}

function renderLocCard(item, showGu = false) {
  const cls = amtClass(item.amount);
  const note = item.note ? `<span class="tag tag-note">${item.note}</span>` : '';
  const guTag = showGu ? `<span class="tag tag-note">${item.gu}</span>` : '';
  
  const isFav = window.favs && window.favs.some(f => f.name === item.name && f.gu === item.gu);
  const starCls = isFav ? 'fav-btn active' : 'fav-btn';
  const starIcon = isFav ? '⭐' : '☆';

  return `<div class="loc-card">
    <div class="loc-card-left">
      <div class="loc-card-name">${item.name}</div>
      <div class="loc-card-tags">${typeTags(item.type)}${guTag}${note}</div>
    </div>
    <div style="display:flex; align-items:center;">
      <div class="loc-card-amt ${cls}">${item.amount.toLocaleString()}원</div>
      <button class="fav-btn ${starCls}" onclick="window.toggleFav('${item.name.replace(/'/g, "\\'")}', '${item.gu}', ${item.amount})">${starIcon}</button>
    </div>
  </div>`;
}

// ── FAV LOGIC ──
window.favs = JSON.parse(localStorage.getItem('favs') || '[]');
window.toggleFav = function(name, gu, amount) {
  const idx = window.favs.findIndex(f => f.name === name && f.gu === gu);
  if (idx > -1) window.favs.splice(idx, 1);
  else window.favs.push({ name, gu, amount });
  localStorage.setItem('favs', JSON.stringify(window.favs));
  
  // Re-render
  window.renderFavs();
  if (document.getElementById('viewDetail').style.display === 'block') {
    showDetail(document.getElementById('detailTitle').textContent);
  } else if (document.getElementById('viewSearch').style.display === 'block') {
    document.getElementById('searchInput').dispatchEvent(new Event('input'));
  }
};
window.renderFavs = function() {
  const wrap = document.getElementById('favListWrap');
  const list = document.getElementById('favListItems');
  if (!wrap || !list) return;
  if (!window.favs.length) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'block';
  list.innerHTML = window.favs.map(f => `
    <div class="fav-item">
      <div class="fav-item-left">
        <span class="fav-gu">${f.gu}</span>
        <span class="fav-name">${f.name}</span>
      </div>
      <div style="display:flex; align-items:center;">
        <div class="fav-amt">${f.amount.toLocaleString()}원</div>
        <button class="fav-btn active" onclick="window.toggleFav('${f.name.replace(/'/g, "\\'")}', '${f.gu}', ${f.amount})">⭐</button>
      </div>
    </div>
  `).join('');
};
// init favs

  const cls = amtClass(maxAmt);
  const card = document.createElement('div');
  card.className = 'gu-card';
  card.innerHTML = `
    <div class="gu-card-top">
      <div class="gu-card-name">${gu}</div>
    </div>
    <div class="gu-card-bottom">
      <div class="gu-card-count">${items.length}개 위치</div>
      <div class="gu-max-badge ${cls}">${amtLabel(maxAmt)}</div>
    </div>`;
  card.addEventListener('click', () => showDetail(gu));
  grid.appendChild(card);
});

// ── Detail View ──
function showDetail(gu) {
  const items = DATA[gu] || [];
  document.getElementById('detailTitle').textContent = gu;
  document.getElementById('detailSubtitle').textContent = `총 ${items.length}개 할증 위치`;

  // Group by amount
  const groups = {};
  items.forEach(i => {
    if (!groups[i.amount]) groups[i.amount] = [];
    groups[i.amount].push(i);
  });
  const amts = Object.keys(groups).map(Number).sort((a, b) => b - a);

  let html = '';
  amts.forEach(amt => {
    const cls = amtClass(amt);
    html += `
      <div class="amt-section">
        <div class="amt-section-title">
          <span class="amt-pill ${cls}">+${amt.toLocaleString()}원</span>
          <span class="amt-pill-count">${groups[amt].length}개 위치</span>
        </div>
        <div class="loc-cards">${groups[amt].map(i => renderLocCard(i)).join('')}</div>
      </div>
      <div class="section-spacer"></div>`;
  });

  document.getElementById('detailBody').innerHTML = html;

  document.getElementById('viewGrid').style.display = 'none';
  document.getElementById('viewSearch').style.display = 'none';
  document.getElementById('viewDetail').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'instant' });
}

document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('viewDetail').style.display = 'none';
  document.getElementById('viewGrid').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'instant' });
});

// ── Search ──
const searchInput = document.getElementById('searchInput');
const searchX = document.getElementById('searchX');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchX.style.display = q ? 'flex' : 'none';

  if (!q) {
    document.getElementById('viewSearch').style.display = 'none';
    document.getElementById('viewDetail').style.display = 'none';
    document.getElementById('viewGrid').style.display = 'block';
    return;
  }

  document.getElementById('viewGrid').style.display = 'none';
  document.getElementById('viewDetail').style.display = 'none';
  document.getElementById('viewSearch').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'instant' });

  const results = [];
  const normalizedQ = q.toLowerCase().replace(/\s+/g, '');
  Object.values(DATA).forEach(items => items.forEach(item => {
    if (item.name.toLowerCase().replace(/\s+/g, '').includes(normalizedQ)) results.push(item);
  }));
  results.sort((a, b) => b.amount - a.amount);

  document.getElementById('searchHeader').innerHTML =
    results.length
      ? `"<strong>${q}</strong>" 검색결과 ${results.length}개`
      : `"<strong>${q}</strong>" 검색결과 없음`;

  document.getElementById('searchBody').innerHTML = results.length
    ? `<div style="padding:0 16px">${results.map(i => renderLocCard(i, true)).join('')}</div>`
    : `<div class="no-result"><p>검색 결과가 없어요.<br>장소명을 다시 확인해보세요.</p></div>`;
});

searchX.addEventListener('click', () => {
  searchInput.value = '';
  searchInput.dispatchEvent(new Event('input'));
  searchInput.focus();
});

// ── Voice Search ──
const voiceBtn = document.getElementById('voiceBtn');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  voiceBtn.style.display = 'none';
} else {
  const recog = new SpeechRecognition();
  recog.lang = 'ko-KR';
  recog.interimResults = false;
  recog.maxAlternatives = 1;

  recog.onresult = (e) => {
    const text = e.results[0][0].transcript;
    searchInput.value = text;
    searchInput.dispatchEvent(new Event('input'));
    voiceBtn.classList.remove('listening');
    voiceBtn.textContent = '🎙️ 음성으로 찾기';
  };
  recog.onerror = () => {
    voiceBtn.classList.remove('listening');
    voiceBtn.textContent = '🎙️ 음성으로 찾기';
  };
  recog.onend = () => {
    voiceBtn.classList.remove('listening');
    voiceBtn.textContent = '🎙️ 음성으로 찾기';
  };

  voiceBtn.addEventListener('click', () => {
    if (voiceBtn.classList.contains('listening')) {
      recog.stop();
    } else {
      searchInput.value = '';
      searchInput.placeholder = '말씀해주세요...';
      voiceBtn.classList.add('listening');
      voiceBtn.textContent = '⏹️ 듣는 중...';
      recog.start();
      setTimeout(() => { searchInput.placeholder = '장소명 검색 (예: 코엑스, 타워팰리스)'; }, 3000);
    }
  });
}
</script>
</body>
</html>
